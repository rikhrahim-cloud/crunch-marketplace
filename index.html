<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUNCH - Uber For Side Hustles</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: 'Inter', sans-serif;
            background: #FAFAFA;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        
        .fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .slide-in-right {
            animation: slideInRight 0.6s ease-out forwards;
        }

        .pulse-animation {
            animation: pulse 2s infinite;
        }

        .featured-badge {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            animation: shimmer 3s infinite;
            background-size: 1000px 100%;
        }
        
        .card-hover {
            transition: all 0.3s ease;
        }
        
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
        }
        
        .border-minimal {
            border: 1px solid #e5e7eb;
        }
        
        .tag {
            display: inline-block;
            padding: 6px 14px;
            font-size: 11px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-weight: 500;
            border-radius: 4px;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            margin-bottom: 8px;
        }

        .message-sent {
            background: #000;
            color: white;
            margin-left: auto;
        }

        .message-received {
            background: #f3f4f6;
            color: #1f2937;
        }

        .star-rating {
            display: inline-flex;
            gap: 4px;
        }

        .star {
            cursor: pointer;
            font-size: 24px;
            transition: all 0.2s;
        }

        .star:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const cities = ['All Cities', 'Yaoundé', 'Douala', 'Bamenda', 'Bafoussam', 'Garoua', 'Maroua', 'Ngaoundéré', 'Bertoua', 'Buea', 'Limbe'];

        const categories = [
            'All',
            'Household Services',
            'Childcare & Elderly Care',
            'Cooking Services',
            'Construction & Repairs',
            'Technical Services',
            'Beauty & Personal Care',
            'Garden & Outdoor',
            'Events & Entertainment',
            'Transport & Delivery',
            'Auto Services',
            'Food Vendors'
        ];

        const services = [
            'Laundry woman', 'Laundry man', 'Ironing service', 'Babysitter', 'Nanny', 
            'House help', 'Home cook', 'Party cook', 'Cleaner', 'Dish washer', 
            'Caretaker', 'Elderly care assistant', 'Plumber', 'Electrician', 'Welder',
            'Carpenter', 'Furniture repairer', 'Aluminium fabricator', 'Mason', 'Painter',
            'Ceiling installer', 'Glass installer', 'Barber', 'Hairdresser', 'Mobile barber',
            'Makeup artist', 'Nail technician', 'Manicure specialist', 'Pedicure specialist',
            'DJ', 'MC', 'Sound system operator', 'Event decorator', 'Event security',
            'Photographer', 'Gardener', 'Lawn mower', 'Tree trimmer', 'Compound cleaner',
            'Waste collector', 'Motorbike rider', 'Taxi driver', 'Delivery rider',
            'Personal driver', 'Car wash attendant', 'Tyre repairer', 'Auto cleaner',
            'Food vendor', 'Breakfast seller', 'Grill assistant'
        ];

        function CrunchApp() {
            const [currentView, setCurrentView] = useState('home');
            const [userType, setUserType] = useState(null);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [providers, setProviders] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [selectedCity, setSelectedCity] = useState('All Cities');
            const [selectedProvider, setSelectedProvider] = useState(null);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [showRegisterModal, setShowRegisterModal] = useState(false);
            const [showProfileModal, setShowProfileModal] = useState(false);
            const [showBookingModal, setShowBookingModal] = useState(false);
            const [showPaymentModal, setShowPaymentModal] = useState(false);
            const [showMessagingModal, setShowMessagingModal] = useState(false);
            const [showReviewModal, setShowReviewModal] = useState(false);
            const [showCalendarModal, setShowCalendarModal] = useState(false);
            const [loginType, setLoginType] = useState('user');
            const [messages, setMessages] = useState([]);
            const [newMessage, setNewMessage] = useState('');
            const [rating, setRating] = useState(0);
            const [reviewText, setReviewText] = useState('');
            const [profileImage, setProfileImage] = useState(null);
            
            const [bookingData, setBookingData] = useState({
                date: '',
                time: '',
                hours: 2,
                address: '',
                notes: '',
                paymentMethod: 'mtn',
                phoneNumber: ''
            });

            const [profileData, setProfileData] = useState({
                name: '',
                service: services[0],
                category: categories[1],
                city: cities[1],
                phone: '',
                description: '',
                hourlyRate: '',
                image: null,
                featured: false
            });

            const filteredProviders = providers.filter(provider => {
                const matchesSearch = 
                    provider.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    provider.service.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    provider.description.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesCategory = selectedCategory === 'All' || provider.category === selectedCategory;
                const matchesCity = selectedCity === 'All Cities' || provider.city === selectedCity;
                return matchesSearch && matchesCategory && matchesCity;
            });

            const featuredProviders = providers.filter(p => p.featured).slice(0, 3);

            const handleLogin = (type) => {
                setIsLoggedIn(true);
                setUserType(type);
                setShowLoginModal(false);
                if (type === 'admin') {
                    setCurrentView('admin');
                }
            };

            const handleCreateProfile = () => {
                const newProvider = {
                    ...profileData,
                    id: Date.now(),
                    rating: 0,
                    reviewCount: 0,
                    reviews: [],
                    verified: false,
                    responseTime: '< 2hr',
                    completedJobs: 0,
                    image: profileImage || 'https://via.placeholder.com/400x400?text=No+Image'
                };
                setProviders([...providers, newProvider]);
                setShowProfileModal(false);
                alert('Profile created successfully!');
                setCurrentView('home');
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        setProfileImage(e.target.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleBooking = () => {
                setShowBookingModal(false);
                setShowPaymentModal(true);
            };

            const handlePayment = () => {
                setShowPaymentModal(false);
                alert(`Payment request sent to ${bookingData.phoneNumber} via ${bookingData.paymentMethod.toUpperCase()}. Please approve on your phone.`);
                setShowCalendarModal(true);
            };

            const sendMessage = () => {
                if (newMessage.trim()) {
                    setMessages([...messages, { text: newMessage, sent: true, time: new Date().toLocaleTimeString() }]);
                    setNewMessage('');
                    // Simulate response
                    setTimeout(() => {
                        setMessages(prev => [...prev, { 
                            text: "Thank you for your message! I'll get back to you soon.", 
                            sent: false, 
                            time: new Date().toLocaleTimeString() 
                        }]);
                    }, 2000);
                }
            };

            const submitReview = () => {
                if (rating > 0 && reviewText.trim()) {
                    const updatedProviders = providers.map(p => {
                        if (p.id === selectedProvider.id) {
                            const newReviews = [...(p.reviews || []), { rating, text: reviewText, date: new Date().toLocaleDateString(), user: 'You' }];
                            const avgRating = newReviews.reduce((sum, r) => sum + r.rating, 0) / newReviews.length;
                            return { ...p, reviews: newReviews, rating: avgRating, reviewCount: newReviews.length };
                        }
                        return p;
                    });
                    setProviders(updatedProviders);
                    setShowReviewModal(false);
                    setRating(0);
                    setReviewText('');
                    alert('Review submitted successfully!');
                }
            };

            const toggleFeatured = (id) => {
                setProviders(providers.map(p => p.id === id ? {...p, featured: !p.featured} : p));
            };

            const deleteProvider = (id) => {
                if (window.confirm('Delete this provider?')) {
                    setProviders(providers.filter(p => p.id !== id));
                }
            };

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="fixed top-0 left-0 right-0 bg-white backdrop-blur-md z-50 border-b border-minimal shadow-sm">
                        <div className="max-w-7xl mx-auto px-6 lg:px-8">
                            <div className="flex justify-between items-center h-20">
                                <button onClick={() => setCurrentView('home')} className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-lg flex items-center justify-center text-white font-bold text-xl" style={{background: 'linear-gradient(135deg, #FF6B9D, #C239B3)'}}>
                                        C
                                    </div>
                                    <span className="text-2xl font-semibold tracking-tight">CRUNCH</span>
                                </button>
                                <nav className="hidden md:flex items-center space-x-8">
                                    <button onClick={() => setCurrentView('home')} className="text-sm hover:text-gray-600 transition">Browse</button>
                                    <button onClick={() => setCurrentView('about')} className="text-sm hover:text-gray-600 transition">About</button>
                                    <button onClick={() => setCurrentView('terms')} className="text-sm hover:text-gray-600 transition">Terms</button>
                                    <button onClick={() => setCurrentView('contact')} className="text-sm hover:text-gray-600 transition">Contact</button>
                                </nav>
                                <div className="flex items-center gap-4">
                                    {!isLoggedIn ? (
                                        <>
                                            <button onClick={() => { setShowLoginModal(true); setLoginType('user'); }} className="text-sm hover:text-gray-600 transition">Sign In</button>
                                            <button onClick={() => setShowRegisterModal(true)} className="bg-black text-white px-6 py-2.5 text-sm hover:bg-gray-800 transition rounded-md">Join Now</button>
                                        </>
                                    ) : (
                                        <>
                                            {userType === 'provider' && (
                                                <button onClick={() => setShowProfileModal(true)} className="text-sm hover:text-gray-600 transition">My Profile</button>
                                            )}
                                            {userType === 'admin' && (
                                                <button onClick={() => setCurrentView('admin')} className="text-sm bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700">Admin Panel</button>
                                            )}
                                            <button onClick={() => { setIsLoggedIn(false); setUserType(null); setCurrentView('home'); }} className="text-sm text-red-600 hover:text-red-700 transition">Logout</button>
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <div className="pt-20">
                        {currentView === 'home' && (
                            <>
                                {/* Hero */}
                                <section className="py-24 px-6 bg-white">
                                    <div className="max-w-4xl mx-auto text-center">
                                        <h1 className="text-6xl md:text-7xl font-bold mb-6 fade-in-up">
                                            Uber For Side Hustles
                                        </h1>
                                        <p className="text-xl text-gray-600 mb-12 max-w-2xl mx-auto slide-in-right">
                                            Connect with skilled local professionals for every service you need
                                        </p>
                                        <div className="max-w-2xl mx-auto fade-in-up">
                                            <div className="flex items-center bg-gray-50 rounded-lg overflow-hidden border border-gray-200">
                                                <input
                                                    type="text"
                                                    placeholder="Search for any service..."
                                                    className="flex-1 px-6 py-4 text-base focus:outline-none bg-transparent"
                                                    value={searchTerm}
                                                    onChange={(e) => setSearchTerm(e.target.value)}
                                                />
                                                <button className="px-8 py-4 bg-black text-white text-sm font-medium hover:bg-gray-800 transition">
                                                    SEARCH
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                {/* Featured Providers */}
                                {featuredProviders.length > 0 && (
                                    <section className="py-16 px-6 bg-gradient-to-r from-yellow-50 to-orange-50">
                                        <div className="max-w-7xl mx-auto">
                                            <h2 className="text-3xl font-bold mb-8 text-center">⭐ Featured Professionals</h2>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                {featuredProviders.map((provider, idx) => (
                                                    <div
                                                        key={provider.id}
                                                        onClick={() => { setSelectedProvider(provider); setCurrentView('provider'); }}
                                                        className="card-hover cursor-pointer bg-white border-2 border-yellow-400 overflow-hidden rounded-lg relative pulse-animation"
                                                    >
                                                        <div className="absolute top-4 right-4 z-10">
                                                            <span className="featured-badge text-white text-xs px-3 py-1 rounded-full font-bold">
                                                                ⭐ FEATURED
                                                            </span>
                                                        </div>
                                                        <div className="aspect-square overflow-hidden bg-gray-100">
                                                            <img src={provider.image} alt={provider.name} className="w-full h-full object-cover" />
                                                        </div>
                                                        <div className="p-5">
                                                            <h3 className="font-semibold text-lg mb-1">{provider.name}</h3>
                                                            <p className="text-sm text-gray-500">{provider.service}</p>
                                                            <p className="text-lg font-bold mt-3">{provider.hourlyRate} CFA/hr</p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </section>
                                )}

                                {/* Filters */}
                                <section className="py-12 px-6 bg-gray-50 border-y">
                                    <div className="max-w-7xl mx-auto">
                                        <div className="mb-8">
                                            <h3 className="text-sm font-medium text-gray-700 mb-4">Filter by City</h3>
                                            <div className="flex flex-wrap gap-2">
                                                {cities.map(city => (
                                                    <button
                                                        key={city}
                                                        onClick={() => setSelectedCity(city)}
                                                        className={`tag ${selectedCity === city ? 'bg-black text-white' : 'bg-white text-gray-700 hover:bg-gray-100 border border-gray-200'}`}
                                                    >
                                                        {city}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <h3 className="text-sm font-medium text-gray-700 mb-4">Filter by Category</h3>
                                            <div className="flex flex-wrap gap-2">
                                                {categories.map(category => (
                                                    <button
                                                        key={category}
                                                        onClick={() => setSelectedCategory(category)}
                                                        className={`tag ${selectedCategory === category ? 'bg-black text-white' : 'bg-white text-gray-700 hover:bg-gray-100 border border-gray-200'}`}
                                                    >
                                                        {category}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                {/* Providers */}
                                <section className="py-16 px-6">
                                    <div className="max-w-7xl mx-auto">
                                        <div className="flex justify-between items-center mb-8">
                                            <h2 className="text-2xl font-semibold">
                                                {filteredProviders.length} {filteredProviders.length === 1 ? 'Professional' : 'Professionals'} Available
                                            </h2>
                                            {isLoggedIn && userType === 'provider' && (
                                                <button 
                                                    onClick={() => setShowProfileModal(true)}
                                                    className="bg-black text-white px-6 py-3 rounded-md hover:bg-gray-800 transition text-sm font-medium"
                                                >
                                                    + Create Profile
                                                </button>
                                            )}
                                        </div>

                                        {filteredProviders.length === 0 ? (
                                            <div className="text-center py-20 bg-white rounded-lg border border-gray-200">
                                                <p className="text-gray-500 text-lg mb-4">No professionals found</p>
                                                <button
                                                    onClick={() => { setSearchTerm(''); setSelectedCategory('All'); setSelectedCity('All Cities'); }}
                                                    className="text-sm underline hover:no-underline"
                                                >
                                                    Clear all filters
                                                </button>
                                            </div>
                                        ) : (
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                                {filteredProviders.map((provider) => (
                                                    <div
                                                        key={provider.id}
                                                        onClick={() => { setSelectedProvider(provider); setCurrentView('provider'); }}
                                                        className="card-hover cursor-pointer bg-white border border-gray-200 overflow-hidden rounded-lg"
                                                    >
                                                        {provider.featured && (
                                                            <div className="bg-gradient-to-r from-yellow-400 to-orange-400 text-white text-xs text-center py-1 font-bold">
                                                                ⭐ FEATURED
                                                            </div>
                                                        )}
                                                        <div className="aspect-square overflow-hidden bg-gray-100">
                                                            <img src={provider.image} alt={provider.name} className="w-full h-full object-cover" />
                                                        </div>
                                                        <div className="p-5">
                                                            <div className="flex items-start justify-between mb-2">
                                                                <div>
                                                                    <h3 className="font-semibold text-base mb-1">{provider.name}</h3>
                                                                    <p className="text-xs text-gray-500 uppercase">{provider.service}</p>
                                                                    <p className="text-xs text-gray-400 mt-1">📍 {provider.city}</p>
                                                                </div>
                                                                {provider.verified && (
                                                                    <span className="tag bg-green-100 text-green-700 text-[9px]">✓</span>
                                                                )}
                                                            </div>
                                                            <p className="text-sm text-gray-600 mb-4 line-clamp-2">{provider.description}</p>
                                                            <div className="flex items-center justify-between pt-4 border-t">
                                                                <div className="flex items-baseline gap-1">
                                                                    <span className="text-lg font-semibold">{provider.hourlyRate}</span>
                                                                    <span className="text-xs text-gray-500">CFA/hr</span>
                                                                </div>
                                                                {provider.rating > 0 && (
                                                                    <div className="flex items-center gap-1">
                                                                        <span className="text-xs">★</span>
                                                                        <span className="text-xs font-medium">{provider.rating.toFixed(1)}</span>
                                                                        <span className="text-xs text-gray-400">({provider.reviewCount})</span>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </section>
                            </>
                        )}

                        {currentView === 'provider' && selectedProvider && (
                            <section className="py-20 px-6">
                                <div className="max-w-5xl mx-auto">
                                    <button onClick={() => setCurrentView('home')} className="text-sm mb-12 hover:opacity-60 transition">
                                        ← Back to search
                                    </button>

                                    <div className="grid md:grid-cols-2 gap-12">
                                        <div className="aspect-square bg-gray-100 rounded-lg overflow-hidden">
                                            <img src={selectedProvider.image} alt={selectedProvider.name} className="w-full h-full object-cover" />
                                        </div>
                                        <div>
                                            <h1 className="text-4xl font-bold mb-3">{selectedProvider.name}</h1>
                                            <p className="text-sm text-gray-500 uppercase mb-2">{selectedProvider.service}</p>
                                            <p className="text-sm text-gray-400 mb-6">📍 {selectedProvider.city}</p>
                                            <p className="text-gray-700 mb-8">{selectedProvider.description}</p>
                                            
                                            <div className="grid grid-cols-2 gap-4 mb-8 p-6 bg-gray-50 rounded-lg">
                                                <div>
                                                    <div className="text-xs text-gray-500 uppercase mb-1">Phone</div>
                                                    <div className="font-medium">{selectedProvider.phone}</div>
                                                </div>
                                                <div>
                                                    <div className="text-xs text-gray-500 uppercase mb-1">Response</div>
                                                    <div className="font-medium">{selectedProvider.responseTime}</div>
                                                </div>
                                                <div className="col-span-2">
                                                    <div className="text-xs text-gray-500 uppercase mb-1">Rating</div>
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-2xl font-bold">{selectedProvider.rating > 0 ? selectedProvider.rating.toFixed(1) : 'New'}</span>
                                                        {selectedProvider.rating > 0 && (
                                                            <span className="text-sm text-gray-500">({selectedProvider.reviewCount} reviews)</span>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="mb-8">
                                                <div className="flex items-baseline gap-2 mb-2">
                                                    <span className="text-3xl font-bold">{selectedProvider.hourlyRate}</span>
                                                    <span className="text-gray-500">CFA per hour</span>
                                                </div>
                                            </div>

                                            <div className="space-y-3">
                                                {isLoggedIn && userType === 'user' && (
                                                    <>
                                                        <button
                                                            onClick={() => setShowBookingModal(true)}
                                                            className="w-full bg-black text-white py-4 text-sm font-medium hover:bg-gray-800 transition rounded-md"
                                                        >
                                                            BOOK NOW
                                                        </button>
                                                        <button
                                                            onClick={() => setShowMessagingModal(true)}
                                                            className="w-full border border-black text-black py-4 text-sm font-medium hover:bg-gray-50 transition rounded-md"
                                                        >
                                                            💬 MESSAGE
                                                        </button>
                                                        <button
                                                            onClick={() => setShowReviewModal(true)}
                                                            className="w-full border border-gray-300 text-gray-700 py-4 text-sm font-medium hover:bg-gray-50 transition rounded-md"
                                                        >
                                                            ⭐ LEAVE REVIEW
                                                        </button>
                                                    </>
                                                )}

                                                {!isLoggedIn && (
                                                    <button
                                                        onClick={() => { setShowLoginModal(true); setLoginType('user'); }}
                                                        className="w-full bg-black text-white py-4 text-sm font-medium hover:bg-gray-800 transition rounded-md"
                                                    >
                                                        SIGN IN TO BOOK
                                                    </button>
                                                )}
                                            </div>

                                            {/* Reviews Section */}
                                            {selectedProvider.reviews && selectedProvider.reviews.length > 0 && (
                                                <div className="mt-12">
                                                    <h3 className="text-xl font-bold mb-4">Reviews</h3>
                                                    <div className="space-y-4">
                                                        {selectedProvider.reviews.map((review, idx) => (
                                                            <div key={idx} className="bg-gray-50 p-4 rounded-lg">
                                                                <div className="flex items-center justify-between mb-2">
                                                                    <span className="font-medium">{review.user}</span>
                                                                    <div className="flex gap-1">
                                                                        {[...Array(5)].map((_, i) => (
                                                                            <span key={i} className={`text-sm ${i < review.rating ? 'text-yellow-400' : 'text-gray-300'}`}>★</span>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                                <p className="text-sm text-gray-600">{review.text}</p>
                                                                <p className="text-xs text-gray-400 mt-2">{review.date}</p>

                                <div className="flex-1 overflow-y-auto mb-4 space-y-2">
                                    {messages.length === 0 ? (
                                        <div className="text-center text-gray-500 text-sm mt-20">
                                            No messages yet. Start the conversation!
                                        </div>
                                    ) : (
                                        messages.map((msg, idx) => (
                                            <div key={idx} className={`flex ${msg.sent ? 'justify-end' : 'justify-start'}`}>
                                                <div className={`message-bubble ${msg.sent ? 'message-sent' : 'message-received'}`}>
                                                    <div className="text-sm">{msg.text}</div>
                                                    <div className={`text-xs mt-1 ${msg.sent ? 'text-gray-300' : 'text-gray-500'}`}>{msg.time}</div>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                                <div className="flex gap-2">
                                    <input
                                        type="text"
                                        placeholder="Type a message..."
                                        className="flex-1 px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-black"
                                        value={newMessage}
                                        onChange={(e) => setNewMessage(e.target.value)}
                                        onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                                    />
                                    <button onClick={sendMessage} className="px-6 py-3 bg-black text-white rounded-lg hover:bg-gray-800">
                                        Send
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Review Modal */}
                    {showReviewModal && selectedProvider && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-lg p-8 max-w-md w-full">
                                <h2 className="text-2xl font-bold mb-6">Leave a Review</h2>
                                <div className="mb-6">
                                    <label className="block text-sm font-medium mb-3">Rating</label>
                                    <div className="star-rating flex justify-center">
                                        {[1,2,3,4,5].map(star => (
                                            <span
                                                key={star}
                                                className={`star ${star <= rating ? 'text-yellow-400' : 'text-gray-300'}`}
                                                onClick={() => setRating(star)}
                                            >
                                                ★
                                            </span>
                                        ))}
                                    </div>
                                </div>
                                <div className="mb-6">
                                    <label className="block text-sm font-medium mb-2">Your Review</label>
                                    <textarea
                                        rows="4"
                                        placeholder="Share your experience..."
                                        className="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-black"
                                        value={reviewText}
                                        onChange={(e) => setReviewText(e.target.value)}
                                    ></textarea>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowReviewModal(false)} className="flex-1 py-3 border border-gray-200 rounded-md hover:bg-gray-50">Cancel</button>
                                    <button
                                        onClick={submitReview}
                                        disabled={rating === 0 || !reviewText.trim()}
                                        className="flex-1 py-3 bg-black text-white rounded-md hover:bg-gray-800 disabled:bg-gray-300"
                                    >
                                        Submit Review
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Calendar Modal */}
                    {showCalendarModal && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-6">
                            <div className="bg-white rounded-lg p-8 max-w-md w-full">
                                <div className="text-center">
                                    <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <span className="text-3xl">✓</span>
                                    </div>
                                    <h2 className="text-2xl font-bold mb-4">Booking Confirmed!</h2>
                                    <div className="bg-gray-50 rounded-lg p-6 mb-6 text-left">
                                        <div className="text-sm text-gray-500 mb-4">📅 Booking Details</div>
                                        <div className="space-y-2 text-sm">
                                            <div className="flex justify-between">
                                                <span className="text-gray-600">Provider:</span>
                                                <span className="font-medium">{selectedProvider?.name}</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-gray-600">Date:</span>
                                                <span className="font-medium">{bookingData.date}</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-gray-600">Time:</span>
                                                <span className="font-medium">{bookingData.time}</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-gray-600">Duration:</span>
                                                <span className="font-medium">{bookingData.hours} hours</span>
                                            </div>
                                            <div className="flex justify-between pt-2 border-t">
                                                <span className="text-gray-600">Total Paid:</span>
                                                <span className="font-bold">{selectedProvider.hourlyRate * bookingData.hours} CFA</span>
                                            </div>
                                        </div>
                                    </div>
                                    <p className="text-sm text-gray-600 mb-6">
                                        Confirmation sent to your phone. The provider will contact you shortly.
                                    </p>
                                    <button
                                        onClick={() => {
                                            setShowCalendarModal(false);
                                            setCurrentView('home');
                                            setBookingData({ date: '', time: '', hours: 2, address: '', notes: '', paymentMethod: 'mtn', phoneNumber: '' });
                                        }}
                                        className="w-full py-3 bg-black text-white rounded-md hover:bg-gray-800"
                                    >
                                        Done
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="bg-white border-t py-12 px-6">
                        <div className="max-w-7xl mx-auto">
                            <div className="grid md:grid-cols-4 gap-8 mb-8">
                                <div className="md:col-span-2">
                                    <div className="flex items-center gap-3 mb-4">
                                        <div className="w-10 h-10 rounded-lg flex items-center justify-center text-white font-bold" style={{background: 'linear-gradient(135deg, #FF6B9D, #C239B3)'}}>
                                            C
                                        </div>
                                        <div className="text-xl font-semibold">CRUNCH</div>
                                    </div>
                                    <p className="text-sm text-gray-600 mb-4">Uber For Side Hustles</p>
                                    <div className="flex gap-4">
                                        <a href="https://twitter.com/crunch" target="_blank" className="text-gray-600 hover:text-black">Twitter</a>
                                        <a href="https://instagram.com/crunch" target="_blank" className="text-gray-600 hover:text-black">Instagram</a>
                                        <a href="https://wa.me/237670791352" target="_blank" className="text-gray-600 hover:text-black">WhatsApp</a>
                                    </div>
                                </div>
                                <div>
                                    <div className="text-xs font-medium uppercase text-gray-500 mb-4">Company</div>
                                    <div className="space-y-2 text-sm">
                                        <div><button onClick={() => setCurrentView('about')} className="hover:underline">About</button></div>
                                        <div><button onClick={() => setCurrentView('terms')} className="hover:underline">Terms</button></div>
                                        <div><button onClick={() => setCurrentView('contact')} className="hover:underline">Contact</button></div>
                                    </div>
                                </div>
                                <div>
                                    <div className="text-xs font-medium uppercase text-gray-500 mb-4">Contact</div>
                                    <div className="space-y-2 text-sm">
                                        <div><a href="mailto:rikrhahim@gmail.com" className="hover:underline">Email Us</a></div>
                                        <div><a href="tel:+237670791352" className="hover:underline">+237 670 791 352</a></div>
                                    </div>
                                </div>
                            </div>
                            <div className="pt-8 border-t text-center text-sm text-gray-500">
                                © 2026 CRUNCH. All rights reserved.
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<CrunchApp />, document.getElementById('root'));
    </script>
</body>
</html>
