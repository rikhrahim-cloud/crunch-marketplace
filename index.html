                                <section className="py-16 px-6 bg-white">
                                    <div className="max-w-7xl mx-auto">
                                        <h2 className="text-center text-sm tracking-widest uppercase text-gray-400 mb-8">Browse by Category</h2>
                                        <div className="flex flex-wrap justify-center gap-3 mb-16">
                                            {categories.map((category, idx) => (
                                                <button
                                                    key={category}
                                                    onClick={() => setSelectedCategory(category)}
                                                    className={`tag btn-minimal fade-in opacity-0 ${
                                                        selectedCategory === category
                                                            ? 'bg-black text-white'
                                                            : 'bg-gray-50 text-gray-700 hover:bg-gray-100'
                                                    }`}
                                                    style={{ animationDelay: `${idx * 0.03}s` }}
                                                >
                                                    {category}
                                                </button>
                                            ))}
                                        </div>

                                        {/* Results Count */}
                                        <div className="text-center mb-12">
                                            <p className="text-gray-600">
                                                {filteredProviders.length} {filteredProviders.length === 1 ? 'professional' : 'professionals'} available
                                            </p>
                                        </div>

                                        {/* Providers Grid */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                            {filteredProviders.map((provider, idx) => (
                                                <div
                                                    key={provider.id}
                                                    onClick={() => viewProvider(provider)}
                                                    className="card-hover cursor-pointer bg-white border-minimal overflow-hidden fade-in-up opacity-0"
                                                    style={{ animationDelay: `${idx * 0.05}s` }}
                                                >
                                                    <div className="aspect-square overflow-hidden bg-gray-100">
                                                        <img
                                                            src={provider.image}
                                                            alt={provider.name}
                                                            className="w-full h-full object-cover transition-transform duration-700 hover:scale-105"
                                                        />
                                                    </div>
                                                    <div className="p-5">
                                                        <div className="flex items-start justify-between mb-2">
                                                            <div className="flex-1">
                                                                <h3 className="font-medium text-base mb-1">{provider.name}</h3>
                                                                <p className="text-xs tracking-wide text-gray-500 uppercase">{provider.service}</p>
                                                            </div>
                                                            {provider.verified && (
                                                                <span className="tag bg-black text-white text-[9px]">✓</span>
                                                            )}
                                                        </div>
                                                        <p className="text-xs text-gray-600 mb-4 leading-relaxed line-clamp-2">{provider.description}</p>
                                                        <div className="flex items-center justify-between pt-4 border-t border-minimal">
                                                            <div className="flex items-baseline gap-1">
                                                                <span className="text-lg font-medium">{provider.hourlyRate.toLocaleString()}</span>
                                                                <span className="text-xs text-gray-500">CFA/hr</span>
                                                            </div>
                                                            <div className="flex items-center gap-1">
                                                                <span className="text-xs">★</span>
                                                                <span className="text-xs font-medium">{provider.rating}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        {filteredProviders.length === 0 && (
                                            <div className="text-center py-20">
                                                <p className="text-gray-500 text-lg mb-4">No professionals found</p>
                                                <button
                                                    onClick={() => { setSearchTerm(''); setSelectedCategory('All'); }}
                                                    className="text-sm underline hover:no-underline"
                                                >
                                                    Clear filters
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </section>
                            </>
                        )}

                        {currentView === 'provider' && selectedProvider && (
                            <section className="py-20 px-6">
                                <div className="max-w-5xl mx-auto">
                                    <button
                                        onClick={() => setCurrentView('home')}
                                        className="text-sm tracking-wider mb-12 hover:opacity-60 transition-opacity"
                                    >
                                        ← BACK TO SEARCH
                                    </button>

                                    <div className="grid md:grid-cols-2 gap-12 mb-16">
                                        <div className="aspect-square bg-gray-100">
                                            <img
                                                src={selectedProvider.image}
                                                alt={selectedProvider.name}
                                                className="w-full h-full object-cover"
                                            />
                                        </div>
                                        <div>
                                            <div className="mb-8">
                                                <h1 className="serif text-4xl mb-3">{selectedProvider.name}</h1>
                                                <p className="text-sm tracking-widest text-gray-500 uppercase mb-2">{selectedProvider.service}</p>
                                                <p className="text-xs tracking-wide text-gray-400 uppercase mb-6">{selectedProvider.category}</p>
                                                <p className="text-gray-700 leading-relaxed">{selectedProvider.description}</p>
                                            </div>
                                            <div className="grid grid-cols-3 gap-6 py-8 border-y border-minimal mb-8">
                                                <div>
                                                    <div className="text-xl font-light mb-1">★ {selectedProvider.rating}</div>
                                                    <div className="text-[10px] text-gray-500 uppercase tracking-wide">{selectedProvider.reviewCount} Reviews</div>
                                                </div>
                                                <div>
                                                    <div className="text-xl font-light mb-1">{selectedProvider.completedJobs}</div>
                                                    <div className="text-[10px] text-gray-500 uppercase tracking-wide">Jobs Done</div>
                                                </div>
                                                <div>
                                                    <div className="text-xl font-light mb-1">{selectedProvider.responseTime}</div>
                                                    <div className="text-[10px] text-gray-500 uppercase tracking-wide">Response</div>
                                                </div>
                                            </div>
                                            <div className="space-y-4">
                                                <div className="flex items-baseline gap-2 mb-6">
                                                    <span className="text-3xl font-light">{selectedProvider.hourlyRate.toLocaleString()}</span>
                                                    <span className="text-gray-500">CFA per hour</span>
                                                </div>
                                                <button
                                                    onClick={startBooking}
                                                    className="w-full gradient-bg text-white py-4 text-sm tracking-widest hover:opacity-90 transition-opacity"
                                                >
                                                    BOOK NOW
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </section>
                        )}
                    </div>

                    {/* Booking Modal */}
                    {showBookingModal && selectedProvider && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-6">
                            <div className="bg-white max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                                <div className="p-12">
                                    <div className="flex justify-between items-start mb-12">
                                        <div>
                                            <h2 className="serif text-3xl mb-2">Book Service</h2>
                                            <p className="text-sm text-gray-500">{selectedProvider.name} • {selectedProvider.service}</p>
                                        </div>
                                        <button onClick={() => setShowBookingModal(false)} className="text-2xl hover:opacity-60 transition-opacity">
                                            ×
                                        </button>
                                    </div>

                                    {bookingStep === 1 && (
                                        <div className="space-y-6">
                                            <div>
                                                <label className="block text-xs tracking-widest uppercase text-gray-500 mb-3">Date</label>
                                                <input
                                                    type="date"
                                                    className="w-full border-minimal px-6 py-4 focus:outline-none focus:border-black transition-colors"
                                                    value={bookingData.date}
                                                    onChange={(e) => setBookingData({...bookingData, date: e.target.value})}
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs tracking-widest uppercase text-gray-500 mb-3">Time</label>
                                                <input
                                                    type="time"
                                                    className="w-full border-minimal px-6 py-4 focus:outline-none focus:border-black transition-colors"
                                                    value={bookingData.time}
                                                    onChange={(e) => setBookingData({...bookingData, time: e.target.value})}
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs tracking-widest uppercase text-gray-500 mb-3">Duration (hours)</label>
                                                <select
                                                    className="w-full border-minimal px-6 py-4 focus:outline-none focus:border-black transition-colors"
                                                    value={bookingData.hours}
                                                    onChange={(e) => setBookingData({...bookingData, hours: parseInt(e.target.value)})}
                                                >
                                                    <option value="1">1 hour</option>
                                                    <option value="2">2 hours</option>
                                                    <option value="3">3 hours</option>
                                                    <option value="4">4 hours</option>
                                                    <option value="5">5 hours</option>
                                                    <option value="6">6 hours</option>
                                                    <option value="8">8 hours (full day)</option>
                                                </select>
                                            </div>
                                            <button
                                                onClick={() => setBookingStep(2)}
                                                disabled={!bookingData.date || !bookingData.time}
                                                className="w-full bg-black text-white py-4 text-sm tracking-widest hover:bg-gray-800 transition-colors disabled:bg-gray-200 disabled:text-gray-400"
                                            >
                                                CONTINUE
                                            </button>
                                        </div>
                                    )}

                                    {bookingStep === 2 && (
                                        <div className="space-y-6">
                                            <div>
                                                <label className="block text-xs tracking-widest uppercase text-gray-500 mb-3">Service Address</label>
                                                <input
                                                    type="text"
                                                    placeholder="Enter your address"
                                                    className="w-full border-minimal px-6 py-4 focus:outline-none focus:border-black transition-colors"
                                                    value={bookingData.address}
                                                    onChange={(e) => setBookingData({...bookingData, address: e.target.value})}
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs tracking-widest uppercase text-gray-500 mb-3">Additional Notes (Optional)</label>
                                                <textarea
                                                    rows="4"
                                                    placeholder="Any specific requirements..."
                                                    className="w-full border-minimal px-6 py-4 focus:outline-none focus:border-black transition-colors resize-none"
                                                    value={bookingData.notes}
                                                    onChange={(e) => setBookingData({...bookingData, notes: e.target.value})}
                                                ></textarea>
                                            </div>
                                            <div className="border-minimal p-8">
                                                <div className="flex justify-between items-center mb-2">
                                                    <span className="text-sm text-gray-600">{selectedProvider.hourlyRate.toLocaleString()} CFA/hr × {bookingData.hours} hours</span>
                                                    <span className="text-2xl font-light">{(selectedProvider.hourlyRate * bookingData.hours).toLocaleString()} CFA</span>
                                                </div>
                                            </div>
                                            <div className="flex gap-4">
                                                <button
                                                    onClick={() => setBookingStep(1)}
                                                    className="flex-1 border-minimal py-4 text-sm tracking-widest hover:bg-gray-50 transition-colors"
                                                >
                                                    BACK
                                                </button>
                                                <button
                                                    onClick={completeBooking}
                                                    disabled={!bookingData.address}
                                                    className="flex-1 gradient-bg text-white py-4 text-sm tracking-widest hover:opacity-90 transition-opacity disabled:bg-gray-200 disabled:text-gray-400"
                                                >
                                                    CONFIRM BOOKING
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Confirmation Toast */}
                    {showConfirmation && (
                        <div className="fixed bottom-8 right-8 gradient-bg text-white px-8 py-6 z-50 fade-in rounded-sm">
                            <div className="flex items-center gap-4">
                                <div className="w-2 h-2 bg-white rounded-full"></div>
                                <div>
                                    <div className="font-medium mb-1">Booking Confirmed!</div>
                                    <div className="text-sm opacity-80">You'll receive a confirmation message shortly</div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="bg-white border-t border-minimal py-16 px-6">
                        <div className="max-w-7xl mx-auto">
                            <div className="grid md:grid-cols-4 gap-12 mb-12">
                                <div className="md:col-span-2">
                                    <div className="flex items-center gap-3 mb-6">
                                        <div className="w-10 h-10 gradient-bg rounded-md"></div>
                                        <div className="text-2xl font-light">CRUNCH</div>
                                    </div>
                                    <p className="text-sm text-gray-600 leading-relaxed max-w-sm mb-4">
                                        Connecting skilled professionals with people who need their services.
                                    </p>
                                    <p className="text-xs text-gray-400">Uber For Side Hustles</p>
                                </div>
                                <div>
                                    <div className="text-xs tracking-widest uppercase text-gray-400 mb-6">Quick Links</div>
                                    <div className="space-y-3 text-sm">
                                        <div className="hover:opacity-60 transition-opacity cursor-pointer">About Us</div>
                                        <div className="hover:opacity-60 transition-opacity cursor-pointer">How It Works</div>
                                        <div className="hover:opacity-60 transition-opacity cursor-pointer">Become a Pro</div>
                                        <div className="hover:opacity-60 transition-opacity cursor-pointer">Support</div>
                                    </div>
                                </div>
                                <div>
                                    <div className="text-xs tracking-widest uppercase text-gray-400 mb-6">Contact</div>
                                    <div className="space-y-3 text-sm">
                                        <div className="hover:opacity-60 transition-opacity cursor-pointer">Email Us</div>
                                        <div className="hover:opacity-60 transition-opacity cursor-pointer">Call Us</div>
                                        <div className="hover:opacity-60 transition-opacity cursor-pointer">WhatsApp</div>
                                    </div>
                                </div>
                            </div>
                            <div className="pt-8 border-t border-minimal text-center">
                                <p className="text-xs text-gray-400 tracking-wider">© 2026 CRUNCH. All rights reserved.</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<CrunchApp />, document.getElementById('root'));
    </script>
</body>
</html>
