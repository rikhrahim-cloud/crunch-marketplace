<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUNCH - Premium Home Services</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: 'Inter', sans-serif;
            background: #FAFAFA;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .serif { font-family: 'Cormorant Garamond', serif; }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
        }
        
        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
        
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }
        .stagger-5 { animation-delay: 0.5s; }
        .stagger-6 { animation-delay: 0.6s; }
        
        .card-hover {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }
        
        .btn-minimal {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .btn-minimal::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.05);
            transition: left 0.3s ease;
        }
        
        .btn-minimal:hover::before {
            left: 100%;
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #1a1a1a 0%, #4a4a4a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .border-minimal {
            border: 1px solid rgba(0,0,0,0.08);
        }
        
        .tag {
            display: inline-block;
            padding: 4px 12px;
            font-size: 11px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-weight: 500;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Mock data
        const mockProviders = [
            {
                id: 1,
                name: "Blanc Studio",
                category: "Cleaning",
                rating: 4.9,
                reviewCount: 247,
                hourlyRate: 85,
                image: "https://images.unsplash.com/photo-1581578731548-c64695cc6952?w=800&h=600&fit=crop",
                description: "Premium residential cleaning with meticulous attention to detail",
                verified: true,
                responseTime: "< 1hr",
                completedJobs: 312
            },
            {
                id: 2,
                name: "Atelier Works",
                category: "Handyman",
                rating: 4.8,
                reviewCount: 189,
                hourlyRate: 95,
                image: "https://images.unsplash.com/photo-1621905251918-48416bd8575a?w=800&h=600&fit=crop",
                description: "Refined craftsmanship for discerning homeowners",
                verified: true,
                responseTime: "< 2hr",
                completedJobs: 256
            },
            {
                id: 3,
                name: "Verde Gardens",
                category: "Landscaping",
                rating: 4.9,
                reviewCount: 156,
                hourlyRate: 105,
                image: "https://images.unsplash.com/photo-1558904541-efa843a96f01?w=800&h=600&fit=crop",
                description: "Curated outdoor spaces and botanical design",
                verified: true,
                responseTime: "< 3hr",
                completedJobs: 198
            },
            {
                id: 4,
                name: "Flow Systems",
                category: "Plumbing",
                rating: 4.8,
                reviewCount: 203,
                hourlyRate: 115,
                image: "https://images.unsplash.com/photo-1607472586893-edb57bdc0e39?w=800&h=600&fit=crop",
                description: "Precision plumbing solutions for modern homes",
                verified: true,
                responseTime: "< 30min",
                completedJobs: 378
            },
            {
                id: 5,
                name: "Lumen Electric",
                category: "Electrical",
                rating: 4.9,
                reviewCount: 167,
                hourlyRate: 125,
                image: "https://images.unsplash.com/photo-1621905252507-b35492cc74b4?w=800&h=600&fit=crop",
                description: "Intelligent electrical systems and smart home integration",
                verified: true,
                responseTime: "< 1hr",
                completedJobs: 289
            },
            {
                id: 6,
                name: "Minimal Carpentry",
                category: "Carpentry",
                rating: 4.8,
                reviewCount: 134,
                hourlyRate: 110,
                image: "https://images.unsplash.com/photo-1593062096033-9a26b09da705?w=800&h=600&fit=crop",
                description: "Custom woodwork with Scandinavian sensibility",
                verified: true,
                responseTime: "< 2hr",
                completedJobs: 167
            }
        ];

        function CrunchApp() {
            const [currentView, setCurrentView] = useState('home');
            const [selectedProvider, setSelectedProvider] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [showBookingModal, setShowBookingModal] = useState(false);
            const [bookingStep, setBookingStep] = useState(1);
            const [bookingData, setBookingData] = useState({
                date: '',
                time: '',
                hours: 2,
                address: '',
                notes: ''
            });
            const [showConfirmation, setShowConfirmation] = useState(false);

            const categories = ['All', 'Cleaning', 'Handyman', 'Plumbing', 'Electrical', 'Landscaping', 'Carpentry'];

            const filteredProviders = mockProviders.filter(provider => {
                const matchesSearch = provider.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                    provider.description.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesCategory = selectedCategory === 'All' || provider.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            const viewProvider = (provider) => {
                setSelectedProvider(provider);
                setCurrentView('provider');
            };

            const startBooking = () => {
                setShowBookingModal(true);
                setBookingStep(1);
            };

            const completeBooking = () => {
                setShowBookingModal(false);
                setShowConfirmation(true);
                setTimeout(() => {
                    setShowConfirmation(false);
                    setCurrentView('home');
                    setSelectedProvider(null);
                    setBookingData({ date: '', time: '', hours: 2, address: '', notes: '' });
                }, 3000);
            };

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-md z-50 border-b border-minimal">
                        <div className="max-w-7xl mx-auto px-6 lg:px-8">
                            <div className="flex justify-between items-center h-20">
                                <button onClick={() => setCurrentView('home')} className="serif text-3xl font-light tracking-tight">
                                    CRUNCH
                                </button>
                                <nav className="hidden md:flex items-center space-x-12">
                                    <button className="text-sm tracking-wide hover:opacity-60 transition-opacity">Services</button>
                                    <button className="text-sm tracking-wide hover:opacity-60 transition-opacity">About</button>
                                    <button className="text-sm tracking-wide hover:opacity-60 transition-opacity">Contact</button>
                                </nav>
                                <button className="border-minimal px-6 py-2.5 text-sm tracking-wide hover:bg-black hover:text-white transition-all duration-300">
                                    Account
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <div className="pt-20">
                        {currentView === 'home' && (
                            <>
                                {/* Hero */}
                                <section className="py-32 px-6">
                                    <div className="max-w-4xl mx-auto text-center">
                                        <h1 className="serif text-7xl md:text-8xl font-light mb-8 fade-in-up opacity-0">
                                            Elevated<br/>Home Care
                                        </h1>
                                        <p className="text-lg text-gray-600 mb-12 max-w-2xl mx-auto leading-relaxed fade-in-up opacity-0 stagger-2">
                                            Connect with exceptional professionals who understand that quality is never an accident.
                                        </p>
                                        <div className="max-w-2xl mx-auto fade-in-up opacity-0 stagger-3">
                                            <div className="flex items-center border-minimal bg-white rounded-sm overflow-hidden">
                                                <input
                                                    type="text"
                                                    placeholder="What do you need?"
                                                    className="flex-1 px-8 py-5 text-base focus:outline-none bg-transparent"
                                                    value={searchTerm}
                                                    onChange={(e) => setSearchTerm(e.target.value)}
                                                />
                                                <button className="px-10 py-5 bg-black text-white text-sm tracking-wider hover:bg-gray-800 transition-colors">
                                                    SEARCH
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                {/* Categories */}
                                <section className="py-20 px-6 bg-white">
                                    <div className="max-w-7xl mx-auto">
                                        <div className="flex flex-wrap justify-center gap-3 mb-20">
                                            {categories.map((category, idx) => (
                                                <button
                                                    key={category}
                                                    onClick={() => setSelectedCategory(category)}
                                                    className={`tag btn-minimal fade-in opacity-0 ${
                                                        selectedCategory === category
                                                            ? 'bg-black text-white'
                                                            : 'bg-gray-50 text-gray-700 hover:bg-gray-100'
                                                    }`}
                                                    style={{ animationDelay: `${idx * 0.05}s` }}
                                                >
                                                    {category}
                                                </button>
                                            ))}
                                        </div>

                                        {/* Providers Grid */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                            {filteredProviders.map((provider, idx) => (
                                                <div
                                                    key={provider.id}
                                                    onClick={() => viewProvider(provider)}
                                                    className="card-hover cursor-pointer bg-white border-minimal overflow-hidden fade-in-up opacity-0"
                                                    style={{ animationDelay: `${idx * 0.1}s` }}
                                                >
                                                    <div className="aspect-[4/3] overflow-hidden bg-gray-100">
                                                        <img
                                                            src={provider.image}
                                                            alt={provider.name}
                                                            className="w-full h-full object-cover transition-transform duration-700 hover:scale-105"
                                                        />
                                                    </div>
                                                    <div className="p-8">
                                                        <div className="flex items-start justify-between mb-3">
                                                            <div>
                                                                <h3 className="serif text-2xl mb-1">{provider.name}</h3>
                                                                <p className="text-xs tracking-widest text-gray-500 uppercase">{provider.category}</p>
                                                            </div>
                                                            {provider.verified && (
                                                                <span className="tag bg-black text-white">Verified</span>
                                                            )}
                                                        </div>
                                                        <p className="text-sm text-gray-600 mb-6 leading-relaxed">{provider.description}</p>
                                                        <div className="flex items-center justify-between pt-6 border-t border-minimal">
                                                            <div className="flex items-baseline gap-1">
                                                                <span className="text-2xl font-light">${provider.hourlyRate}</span>
                                                                <span className="text-sm text-gray-500">/hr</span>
                                                            </div>
                                                            <div className="flex items-center gap-1">
                                                                <span className="text-sm">★</span>
                                                                <span className="text-sm font-medium">{provider.rating}</span>
                                                                <span className="text-sm text-gray-400">({provider.reviewCount})</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </section>
                            </>
                        )}

                        {currentView === 'provider' && selectedProvider && (
                            <section className="py-20 px-6">
                                <div className="max-w-5xl mx-auto">
                                    <button
                                        onClick={() => setCurrentView('home')}
                                        className="text-sm tracking-wider mb-12 hover:opacity-60 transition-opacity"
                                    >
                                        ← BACK
                                    </button>

                                    <div className="grid md:grid-cols-2 gap-12 mb-16">
                                        <div className="aspect-[4/3] bg-gray-100">
                                            <img
                                                src={selectedProvider.image}
                                                alt={selectedProvider.name}
                                                className="w-full h-full object-cover"
                                            />
                                        </div>
                                        <div>
                                            <div className="mb-8">
                                                <h1 className="serif text-5xl mb-3">{selectedProvider.name}</h1>
                                                <p className="text-sm tracking-widest text-gray-500 uppercase mb-6">{selectedProvider.category} Services</p>
                                                <p className="text-gray-700 leading-relaxed">{selectedProvider.description}</p>
                                            </div>
                                            <div className="grid grid-cols-3 gap-6 py-8 border-y border-minimal mb-8">
                                                <div>
                                                    <div className="text-2xl font-light mb-1">★ {selectedProvider.rating}</div>
                                                    <div className="text-xs text-gray-500 uppercase tracking-wide">{selectedProvider.reviewCount} Reviews</div>
                                                </div>
                                                <div>
                                                    <div className="text-2xl font-light mb-1">{selectedProvider.completedJobs}</div>
                                                    <div className="text-xs text-gray-500 uppercase tracking-wide">Completed</div>
                                                </div>
                                                <div>
                                                    <div className="text-2xl font-light mb-1">{selectedProvider.responseTime}</div>
                                                    <div className="text-xs text-gray-500 uppercase tracking-wide">Response</div>
                                                </div>
                                            </div>
                                            <div className="space-y-4">
                                                <div className="flex items-baseline gap-2 mb-6">
                                                    <span className="text-4xl font-light">${selectedProvider.hourlyRate}</span>
                                                    <span className="text-gray-500">/hour</span>
                                                </div>
                                                <button
                                                    onClick={startBooking}
                                                    className="w-full bg-black text-white py-4 text-sm tracking-widest hover:bg-gray-800 transition-colors"
                                                >
                                                    BOOK NOW
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </section>
                        )}
                    </div>

                    {/* Booking Modal */}
                    {showBookingModal && selectedProvider && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-6">
                            <div className="bg-white max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                                <div className="p-12">
                                    <div className="flex justify-between items-start mb-12">
                                        <div>
                                            <h2 className="serif text-4xl mb-2">Book Service</h2>
                                            <p className="text-sm text-gray-500">{selectedProvider.name}</p>
                                        </div>
                                        <button onClick={() => setShowBookingModal(false)} className="text-2xl hover:opacity-60 transition-opacity">
                                            ×
                                        </button>
                                    </div>

                                    {bookingStep === 1 && (
                                        <div className="space-y-8">
                                            <div>
                                                <label className="block text-xs tracking-widest uppercase text-gray-500 mb-3">Date</label>
                                                <input
                                                    type="date"
                                                    className="w-full border-minimal px-6 py-4 focus:outline-none focus:border-black transition-colors"
                                                    value={bookingData.date}
                                                    onChange={(e) => setBookingData({...bookingData, date: e.target.value})}
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs tracking-widest uppercase text-gray-500 mb-3">Time</label>
                                                <input
                                                    type="time"
                                                    className="w-full border-minimal px-6 py-4 focus:outline-none focus:border-black transition-colors"
                                                    value={bookingData.time}
                                                    onChange={(e) => setBookingData({...bookingData, time: e.target.value})}
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs tracking-widest uppercase text-gray-500 mb-3">Duration</label>
                                                <select
                                                    className="w-full border-minimal px-6 py-4 focus:outline-none focus:border-black transition-colors"
                                                    value={bookingData.hours}
                                                    onChange={(e) => setBookingData({...bookingData, hours: parseInt(e.target.value)})}
                                                >
                                                    <option value="1">1 hour</option>
                                                    <option value="2">2 hours</option>
                                                    <option value="3">3 hours</option>
                                                    <option value="4">4 hours</option>
                                                    <option value="5">5+ hours</option>
                                                </select>
                                            </div>
                                            <button
                                                onClick={() => setBookingStep(2)}
                                                disabled={!bookingData.date || !bookingData.time}
                                                className="w-full bg-black text-white py-4 text-sm tracking-widest hover:bg-gray-800 transition-colors disabled:bg-gray-200 disabled:text-gray-400"
                                            >
                                                CONTINUE
                                            </button>
                                        </div>
                                    )}

                                    {bookingStep === 2 && (
                                        <div className="space-y-8">
                                            <div>
                                                <label className="block text-xs tracking-widest uppercase text-gray-500 mb-3">Address</label>
                                                <input
                                                    type="text"
                                                    placeholder="123 Main Street, City, State 12345"
                                                    className="w-full border-minimal px-6 py-4 focus:outline-none focus:border-black transition-colors"
                                                    value={bookingData.address}
                                                    onChange={(e) => setBookingData({...bookingData, address: e.target.value})}
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs tracking-widest uppercase text-gray-500 mb-3">Notes (Optional)</label>
                                                <textarea
                                                    rows="4"
                                                    placeholder="Any specific requirements..."
                                                    className="w-full border-minimal px-6 py-4 focus:outline-none focus:border-black transition-colors resize-none"
                                                    value={bookingData.notes}
                                                    onChange={(e) => setBookingData({...bookingData, notes: e.target.value})}
                                                ></textarea>
                                            </div>
                                            <div className="border-minimal p-8">
                                                <div className="flex justify-between items-center mb-2">
                                                    <span className="text-sm text-gray-600">${selectedProvider.hourlyRate}/hr × {bookingData.hours} hours</span>
                                                    <span className="text-2xl font-light">${selectedProvider.hourlyRate * bookingData.hours}</span>
                                                </div>
                                            </div>
                                            <div className="flex gap-4">
                                                <button
                                                    onClick={() => setBookingStep(1)}
                                                    className="flex-1 border-minimal py-4 text-sm tracking-widest hover:bg-gray-50 transition-colors"
                                                >
                                                    BACK
                                                </button>
                                                <button
                                                    onClick={completeBooking}
                                                    disabled={!bookingData.address}
                                                    className="flex-1 bg-black text-white py-4 text-sm tracking-widest hover:bg-gray-800 transition-colors disabled:bg-gray-200 disabled:text-gray-400"
                                                >
                                                    CONFIRM
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Confirmation Toast */}
                    {showConfirmation && (
                        <div className="fixed bottom-8 right-8 bg-black text-white px-8 py-6 z-50 fade-in">
                            <div className="flex items-center gap-4">
                                <div className="w-2 h-2 bg-white rounded-full"></div>
                                <div>
                                    <div className="font-medium mb-1">Booking Confirmed</div>
                                    <div className="text-sm text-gray-400">You'll receive a confirmation email shortly</div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="bg-white border-t border-minimal py-20 px-6">
                        <div className="max-w-7xl mx-auto">
                            <div className="grid md:grid-cols-4 gap-12 mb-16">
                                <div className="md:col-span-2">
                                    <div className="serif text-3xl mb-6">CRUNCH</div>
                                    <p className="text-sm text-gray-600 leading-relaxed max-w-sm">
                                        Curating exceptional home service experiences through quality, precision, and care.
                                    </p>
                                </div>
                                <div>
                                    <div className="text-xs tracking-widest uppercase text-gray-400 mb-6">Services</div>
                                    <div className="space-y-3 text-sm">
                                        <div className="hover:opacity-60 transition-opacity cursor-pointer">Cleaning</div>
                                        <div className="hover:opacity-60 transition-opacity cursor-pointer">Handyman</div>
                                        <div className="hover:opacity-60 transition-opacity cursor-pointer">Landscaping</div>
                                        <div className="hover:opacity-60 transition-opacity cursor-pointer">Electrical</div>
                                    </div>
                                </div>
                                <div>
                                    <div className="text-xs tracking-widest uppercase text-gray-400 mb-6">Company</div>
                                    <div className="space-y-3 text-sm">
                                        <div className="hover:opacity-60 transition-opacity cursor-pointer">About</div>
                                        <div className="hover:opacity-60 transition-opacity cursor-pointer">Become a Pro</div>
                                        <div className="hover:opacity-60 transition-opacity cursor-pointer">Contact</div>
                                        <div className="hover:opacity-60 transition-opacity cursor-pointer">Support</div>
                                    </div>
                                </div>
                            </div>
                            <div className="pt-12 border-t border-minimal text-center">
                                <p className="text-xs text-gray-400 tracking-wider">© 2026 CRUNCH. All rights reserved.</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<CrunchApp />, document.getElementById('root'));
    </script>
</body>
</html>
